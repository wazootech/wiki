# Same job shape as .github/workflows/deploy.yml — for standalone wiki repos
# (root wiki.yaml, no pyproject.toml). Substitute CONFIG_PATH, SITE_BASE_URL, ARTIFACT_PATH.
# Example: repo named "wiki" with site.base_url /wiki → ARTIFACT_PATH _site/wiki

name: Deploy Wiki to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Wiki CLI
        run: pip install wazootech-wiki

      - name: Run Wiki Integrity Audits
        run: wiki -c CONFIG_PATH check --strict -v

      - name: Run Wiki Convention Audits
        run: wiki -c CONFIG_PATH lint --strict -v

      - name: Build Static Site
        run: wiki -c CONFIG_PATH build --output-dir _site --site-base-url SITE_BASE_URL

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "ARTIFACT_PATH"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
