[project]
name = "wiki-cli"
version = "0.1.0"
description = "Clean, pure, idiomatic Python CLI for managing a semantic LLM wiki"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "click>=8.1.7",
    "rdflib>=7.0.0",
    "pyshacl>=0.25.0",
    "pyyaml>=6.0.1",
    "owlrl>=6.0.2",
    "beautifulsoup4>=4.14.3",
    "markdown-it-py>=3.0.0",
]

[project.scripts]
wiki = "wiki_cli.__main__:main"

[tool.setuptools]
packages = ["wiki_cli"]
package-dir = {"" = "src"}

[tool.uv]
package = true
