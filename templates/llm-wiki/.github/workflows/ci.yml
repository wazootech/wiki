name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Audit and Validate Wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Wiki CLI
        run: pip install git+https://github.com/EthanThatOneKid/wiki-cli.git

      - name: Audit wiki style and SHACL constraints
        run: wiki check --strict -v

      - name: Verify SPARQL block rendering is up to date
        run: wiki render --check
