name: Deploy Wiki to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      
      - name: Install Dependencies
        run: uv sync

      - name: Install docs dependencies
        run: uv pip install -r docs/requirements-docs.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate Python API docs
        run: uv run sphinx-build -b html -c docs docs/api/python docs/assets/api/python

      - name: Generate TypeScript API docs
        run: npm install && npm run gendocs:ts

      - name: Run Docs Wiki Integrity Audits
        run: uv run wiki -c docs/wiki.yml check --strict -v

      - name: Run Docs Wiki Convention Audits
        run: uv run wiki -c docs/wiki.yml lint --strict -v

      - name: Build Static Site
        run: uv run wiki -c docs/wiki.yml build --output-dir _site --site-base-url /wiki

      - name: Copy API docs into site output
        run: |
          mkdir -p _site/assets/api
          cp -r docs/assets/api/python _site/assets/api/
          cp -r docs/assets/api/ts _site/assets/api/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
