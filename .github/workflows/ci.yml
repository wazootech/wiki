name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests and Audits
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install Dependencies
      run: uv sync --group dev

    - name: Run Python static analysis
      run: uv run ruff check .

    - name: Run Unit Tests
      env:
        PYTHONPATH: src
      run: uv run python -m unittest discover -s tests

    - name: Run Docs Wiki Integrity Audits
      run: uv run wiki -c docs/wiki.yml check --strict -v

    - name: Run Docs Wiki Convention Audits
      run: uv run wiki -c docs/wiki.yml lint --strict -v

    - name: Verify Docs Wiki Formatting
      run: uv run wiki -c docs/wiki.yml fmt --check -v

    - name: Verify Docs Wiki SPARQL Blocks are Up to Date
      run: uv run wiki -c docs/wiki.yml render --check

  npm-checks:
    name: NPM Package Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Check npm/PyPI version consistency
      run: |
        PY_VER=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml').read())['project']['version'])")
        NPM_VER=$(node -e "console.log(require('./package.json').version)")
        INIT_VER=$(python -c "import re; print(re.search(r'__version__ = \"([^\"]+)\"', open('src/wiki/__init__.py').read()).group(1))")
        test "$PY_VER" = "$NPM_VER" || { echo "::error::Version mismatch: pyproject=$PY_VER package.json=$NPM_VER"; exit 1; }
        test "$PY_VER" = "$INIT_VER" || { echo "::error::Version mismatch: pyproject=$PY_VER __init__.py=$INIT_VER"; exit 1; }

    - name: Syntax check JS files
      run: |
        node -e "require('./npm/python')"
        node -e "require('./npm/setup')"
        node npm/test-setup-argv.js

    - name: Verify npm can pack
      run: npm pack --dry-run

    - name: Build Python package for integration test
      run: uv build

    - name: Integration test (pack and run wiki --help)
      run: |
        TARBALL=$(npm pack --silent)
        TMPDIR=$(mktemp -d)
        cd "$TMPDIR"
        tar xzf "${GITHUB_WORKSPACE}/${TARBALL}"
        cd package
        WHEEL=$(ls "${GITHUB_WORKSPACE}/dist/wazootech_wiki-"*.whl | head -1)
        echo "Installing from wheel: $WHEEL"
        WIKI_PIP_SPEC="$WHEEL" node npm/bin/wiki.js --help
