name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests and Audits
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install Dependencies
      run: uv sync

    - name: Run Unit Tests
      env:
        PYTHONPATH: src
      run: uv run python -m unittest discover -s tests

    - name: Run Docs Wiki Integrity Audits
      run: uv run wiki -c docs/wiki.yaml check --strict -v

    - name: Run Docs Wiki Convention Audits
      run: uv run wiki -c docs/wiki.yaml lint --strict -v

    - name: Verify Docs Wiki Formatting
      run: uv run wiki -c docs/wiki.yaml fmt --check -v

    - name: Verify Docs Wiki SPARQL Blocks are Up to Date
      run: uv run wiki -c docs/wiki.yaml render --check
