input_dirs:
  - wiki
wiki_base: https://wazootech.github.io/wiki/
base_url: /wiki
url_style: dir
content_predicate: schema:articleBody
filename_pattern: "[A-Za-z0-9_()-]+\\.md"
link_style: markdown
check:
  broken_links: warning
lint:
  filename_pattern: warning
  headings: warning
  thematic_breaks: warning
  link_style: warning
context:
  schema: https://schema.org/
  wiki: https://wazootech.github.io/wiki/
  wazoo: https://wazootech.github.io/wiki-cli/vocab/
  foaf: http://xmlns.com/foaf/0.1/
  dcterms: http://purl.org/dc/terms/
  sh: http://www.w3.org/ns/shacl#
  xsd: http://www.w3.org/2001/XMLSchema#
page_layout: layouts/default.html
