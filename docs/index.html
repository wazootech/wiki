<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#3b82f6">
<meta name="msapplication-TileColor" content="#3b82f6">
<link rel="stylesheet" href="%wiki.base_url%/assets/wikipedia.css">
<link rel="icon" href="%wiki.base_url%/assets/logo.svg">
%wiki.head%
</head>
<body>
<aside id="mw-navigation">
  <div id="p-logo" role="banner">
    <a href="%wiki.base_url%/" title="Visit the main page">
      <img src="%wiki.base_url%/assets/logo.svg" alt="" width="80" height="80">
      <span class="logo-text">Wiki CLI</span>
    </a>
  </div>
  <div class="portal" role="navigation" id="p-navigation">
    <h3>Navigation</h3>
    <ul>
      <li><a href="%wiki.base_url%/">Main page</a></li>
    </ul>
  </div>
</aside>

<div class="vector-navigation-wrapper">
  <div class="vector-navigation-left">
    <ul class="vector-tabs">
      <li id="ca-read" class="selected"><a href="javascript:void(0)" onclick="switchTab('read')">Article</a></li>
      <li id="ca-talk"><a href="javascript:void(0)" onclick="switchTab('talk')">Talk / Notes</a></li>
    </ul>
  </div>
  <div class="vector-navigation-search">
    <div id="p-search" role="search">
      <div class="search-container">
        <input type="search" id="searchInput" placeholder="Search Wiki CLI" class="search-input">
        <button class="search-button" type="button" aria-label="Search" onclick="triggerSearch()">&#x1F50D;</button>
      </div>
    </div>
  </div>
</div>

<main id="content" class="mw-body" role="main">
  <div class="page-shell">

    <div id="view-read-content" class="wiki-view-pane">
      %wiki.body%
    </div>

    <div id="view-talk-content" class="wiki-view-pane" style="display: none;">
      <h1 class="firstHeading" id="talkHeading">Talk / Local Notes</h1>
      <div id="siteSub">Your personal scratchpad for this page (saved locally in browser)</div>
      <textarea id="talkNotesArea" class="wiki-textarea" placeholder="Write your notes or discussion comments here..." oninput="saveTalkNotes()"></textarea>
      <div class="wiki-btn-bar">
        <button type="button" class="wiki-btn" onclick="clearTalkNotes()">Clear Notes</button>
        <span class="char-counter" id="charCountDisplay">0 characters</span>
      </div>
    </div>

    <footer class="wiki-footer">
      <p>Powered by the <a href="https://github.com/wazootech/wiki">Wiki CLI</a>.</p>
    </footer>
  </div>
</main>

<script>
const WIKI_BASE_URL = "%wiki.base_url%";

function pageUrl(slug) {
  return WIKI_BASE_URL + '/' + (slug ? slug + '/' : '');
}

function switchTab(viewName) {
  document.querySelectorAll('.vector-tabs li').forEach(function(li) {
    li.classList.remove('selected');
  });
  var tabId = viewName === 'talk' ? 'ca-talk' : 'ca-read';
  var tabEl = document.getElementById(tabId);
  if (tabEl) tabEl.classList.add('selected');
  document.querySelectorAll('.wiki-view-pane').forEach(function(pane) {
    pane.style.display = 'none';
  });
  var paneEl = document.getElementById('view-' + viewName + '-content');
  if (paneEl) paneEl.style.display = 'block';
  if (viewName === 'talk') loadTalkNotes();
}

function getPageSlug() {
  var path = window.location.pathname.replace(WIKI_BASE_URL, '').replace(/^\/+|\/+$/g, '');
  if (!path || path === 'index.html') return '__index__';
  return path.replace(/\/+$/, '').split('/').pop();
}

function loadTalkNotes() {
  var area = document.getElementById('talkNotesArea');
  if (!area) return;
  var saved = localStorage.getItem('wiki_notes_' + getPageSlug());
  area.value = saved || '';
  updateCharCount();
}

function saveTalkNotes() {
  var area = document.getElementById('talkNotesArea');
  if (!area) return;
  localStorage.setItem('wiki_notes_' + getPageSlug(), area.value);
  updateCharCount();
}

function clearTalkNotes() {
  if (confirm('Are you sure you want to clear your local notes for this article?')) {
    var area = document.getElementById('talkNotesArea');
    if (area) {
      area.value = '';
      localStorage.removeItem('wiki_notes_' + getPageSlug());
      updateCharCount();
    }
  }
}

function updateCharCount() {
  var area = document.getElementById('talkNotesArea');
  var countEl = document.getElementById('charCountDisplay');
  if (!area || !countEl) return;
  countEl.textContent = area.value.length + ' character' + (area.value.length === 1 ? '' : 's');
}

function triggerSearch() {
  var query = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!query) return;
  window.location.href = WIKI_BASE_URL + '/?search=' + encodeURIComponent(query);
}

function copyPreContent(pre, button) {
  var text = pre.getAttribute('data-copy') || '';
  var write = navigator.clipboard && navigator.clipboard.writeText
    ? navigator.clipboard.writeText(text)
    : new Promise(function(resolve, reject) {
        var area = document.createElement('textarea');
        area.value = text;
        area.style.position = 'fixed';
        area.style.left = '-9999px';
        document.body.appendChild(area);
        area.select();
        try { document.execCommand('copy') ? resolve() : reject(); }
        catch (err) { reject(); }
        finally { document.body.removeChild(area); }
      });
  write.then(function() {
    var t = button.textContent;
    button.textContent = 'Copied!';
    button.classList.add('code-copy-btn-copied');
    setTimeout(function() {
      button.textContent = t;
      button.classList.remove('code-copy-btn-copied');
    }, 2000);
  });
}

function initCodeCopyButtons() {
  document.querySelectorAll('pre[data-copy]:not([data-copy-ready])').forEach(function(pre) {
    pre.setAttribute('data-copy-ready', '');
    var wrapper = document.createElement('div');
    wrapper.className = 'code-block';
    pre.parentNode.insertBefore(wrapper, pre);
    wrapper.appendChild(pre);
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'code-copy-btn';
    btn.setAttribute('aria-label', 'Copy code');
    btn.textContent = 'Copy';
    btn.addEventListener('click', function() { copyPreContent(pre, btn); });
    wrapper.appendChild(btn);
  });
}

function toggleToc() {
  var list = document.getElementById('toc-list');
  var toggleBtn = document.getElementById('toggleTocBtn');
  if (!list || !toggleBtn) return;
  if (list.style.display === 'none') {
    list.style.display = 'block';
    toggleBtn.textContent = '[hide]';
    localStorage.setItem('wiki_toc_visible', 'true');
  } else {
    list.style.display = 'none';
    toggleBtn.textContent = '[show]';
    localStorage.setItem('wiki_toc_visible', 'false');
  }
}

document.addEventListener('DOMContentLoaded', function() {
  var savedState = localStorage.getItem('wiki_toc_visible');
  var list = document.getElementById('toc-list');
  var toggleBtn = document.getElementById('toggleTocBtn');
  if (savedState === 'false' && list && toggleBtn) {
    list.style.display = 'none';
    toggleBtn.textContent = '[show]';
  }
  initCodeCopyButtons();

  var heading = document.getElementById('talkHeading');
  var titleEl = document.querySelector('.firstHeading');
  if (heading && titleEl) {
    heading.textContent = 'Talk / Local Notes: ' + titleEl.textContent;
  }
});
</script>

</body>
</html>
